<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rápido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>Descreva as características do seu carro e marque os opcionaisque ele possui</p>
                <form onsubmit="salvarCarros(event)">
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block" placeholder="Digite um título"
                            minlength="1" maxlength="30" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="preço">Preço<span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preço" id="preço" class="block" placeholder="Digite um preço"
                            required>
                    </div>

                    <div class="caixaInputs">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" class="block"
                            placeholder="Faça a descrição do seu veículo aqui"></textarea>
                    </div>

                    <div class="caixaInputs">
                        <label for="marca">Marca<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="modelo">Modelo<span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo"
                            required>
                    </div>

                    <div class="caixaInputs">
                        <label for="kilometragem">Kilometragem<span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block"
                            placeholder="Digite a kilometragem" required>
                    </div>

                    <div class="caixaInputs">
                        <label for="data-compra">Data de compra<span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>

                    <div class="caixaInputs">
                        <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="auto">
                        <label for="automatico">Automático</label>
                    </div>

                    <div class="caixaOpcional">
                        <p>Opcionais</p>
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                                <label for="airbag">Airbag</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                                <label for="alarme">Alarme</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="arcondicionado" value="arcondicionado">
                                <label for="arcondicionado">Ar-condicionado</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="cameradere" value="cameradere">
                                <label for="cameradere">Camera de ré</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaOpcional">
                        <ul class="listaOpcionais">
                            <li>
                                <input type="checkbox" name="opcional[]" id="assistentedepista" value="assistentedepista">
                                <label for="assistentedepista">Assistente de Pista</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="partidasemchave" value="partidasemchave">
                                <label for="partidasemchave">Partida sem Chave</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="smartphone" value="smartphone">
                                <label for="smartphone">Integração com Celular</label>
                            </li>
                            <li>
                                <input type="checkbox" name="opcional[]" id="bancocouro" value="bancocouro">
                                <label for="bancocouro">Banco de Couro</label>
                            </li>
                        </ul>
                    </div>
                    <div class="caixaInputs">
                        <p>Fotos do Carro <span class="campo-obrigatorio">*</span></p>
                        <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg" required>
                    </div>
                    <input type="submit" value="Enviar" class="btn-submit">
                </form>
                <hr>
                <h2>Carros Cadastrados</h2>
                <div id="ListarCarros"></div>
            </div>
        </div>
        <script src="script/script.js"></script>
    </div>
</body>

</html>
